<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokédex Web</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">

<header class="bg-red-600 text-white">
  <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold">BuscaPoke</h1>
      <p class="text-red-100 mt-1">Dados em tempo real via PokeAPI</p>
    </div>
    <div class="flex gap-2">
      <input id="searchInput" type="text" placeholder=
      "Buscar pokémon (ex: pikachu)"
        class="px-4 py-2 rounded-lg text-slate-900 w-full sm:w-64 focus:outline-none focus:ring-2 focus:ring-yellow-400">
      <button id="searchBtn" class="bg-yellow-400 hover:bg-yellow-500 text-slate-900 px-5 py-2 rounded-lg font-semibold transition">
        Buscar
      </button>
      <button id="resetBtn" class="bg-red-800 hover:bg-red-900 px-5 py-2 rounded-lg font-semibold transition">
        Todos
      </button>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-10">

  <section class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10">
    <div class="bg-white rounded-xl shadow p-6 flex flex-col items-center justify-center">
      <span class="text-sm text-slate-500">Pokémons carregados</span>
      <span id="totalCount" class="text-3xl font-bold text-slate-900 mt-1">0</span>
    </div>
    <div class="bg-white rounded-xl shadow p-6 flex flex-col items-center justify-center">
      <span class="text-sm text-slate-500">Tipos diferentes</span>
      <span id="typeCount" class="text-3xl font-bold text-slate-900 mt-1">0</span>
    </div>
    <div class="bg-white rounded-xl shadow p-6 flex flex-col items-center justify-center">
      <span class="text-sm text-slate-500">Status da API</span>
      <span id="apiStatus" class="text-3xl font-bold text-amber-500 mt-1">...</span>
    </div>
  </section>

  <section id="loading" class="text-center text-slate-500 py-16">
    Carregando pokémons...
  </section>

  <section id="errorBox" class="hidden bg-red-100 text-red-700 rounded-xl p-6 mb-8 flex items-center gap-3">
    <span class="font-bold">Erro:</span>
    <span id="errorMessage"></span>
  </section>

  <section id="cardsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></section>

</main>

<footer class="bg-red-600 text-red-100 mt-16">
  <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col sm:flex-row justify-between items-center gap-2">
    <span>Projeto acadêmico que possui uso de : HTML, Tailwind, CSS e Fetch API - 2026</span>
   
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
